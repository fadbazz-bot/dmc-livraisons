<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMC Livraisons</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --primary: #1a3a5c;
  --primary-light: #2a5298;
  --accent: #e67e22;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #d1dbe8;
  --text: #1a2332;
  --muted: #6b7c93;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Layout */
.layout { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.hidden { display: none !important; }

/* Login */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a3a5c 0%, #2a5298 100%); }
.login-card { background: white; border-radius: 16px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.login-logo svg { width: 44px; height: 44px; }
.login-logo-text h1 { font-size: 20px; font-weight: 700; color: var(--primary); }
.login-logo-text p { font-size: 12px; color: var(--muted); }
.login-card label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.login-card select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: white; margin-bottom: 20px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { filter: brightness(1.1); }
.btn-warning { background: var(--warning); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-outline { background: white; color: var(--primary); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }

/* Sidebar */
.sidebar-logo { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
.sidebar-logo svg { width: 32px; height: 32px; }
.sidebar-logo-text { font-size: 15px; font-weight: 700; line-height: 1.2; }
.sidebar-logo-text span { font-size: 11px; opacity: 0.6; font-weight: 400; display: block; }
.sidebar-user { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-user-name { font-size: 13px; font-weight: 600; }
.sidebar-user-role { font-size: 11px; opacity: 0.6; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 8px 0; }
.nav-section { padding: 12px 16px 4px; font-size: 10px; font-weight: 700; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.08em; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 13px; cursor: pointer; transition: background 0.1s; border-radius: 0; color: rgba(255,255,255,0.75); }
.nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
.nav-item.active { background: rgba(255,255,255,0.15); color: white; font-weight: 600; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-bottom { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1); }
.sidebar-bottom button { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; padding: 6px 0; }
.sidebar-bottom button:hover { color: white; }
.nav-badge { background: #e74c3c; color: white; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; margin-left: auto; animation: pulse 2s infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Header */
.page-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 17px; font-weight: 700; color: var(--primary); }
.page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* Cards */
.page-content { padding: 24px; flex: 1; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
.card-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
.card-title { font-size: 14px; font-weight: 700; color: var(--primary); }
.card-body { padding: 16px 20px; }
.card-cmd { transition: box-shadow 0.15s; }
.card-cmd:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.card-retard { border-left: 3px solid var(--warning); }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
.form-label span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 4px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: white; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(42,82,152,0.1); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
.form-error { font-size: 12px; color: var(--danger); margin-top: 4px; }

/* Expedition group */
.exp-group { background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.exp-row { display: flex; gap: 10px; align-items: flex-end; }
.exp-row .form-group { margin-bottom: 0; flex: 1; }
.exp-remove { flex-shrink: 0; }

/* Badge */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.badge-en_attente  { background: #FEF3C7; color: #92400E; }
.badge-feu_vert    { background: #D1FAE5; color: #065F46; }
.badge-prete       { background: #DBEAFE; color: #1E40AF; }
.badge-sortie      { background: #F3F4F6; color: #374151; }
.badge-terminee    { background: #D1FAE5; color: #065F46; }

/* Timeline jalons */
.jalon-track { display: flex; align-items: center; gap: 0; margin: 12px 0; }
.jalon-step { display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }
.jalon-step:not(:last-child)::after { content: ''; position: absolute; top: 14px; left: 50%; width: 100%; height: 2px; background: var(--border); z-index: 0; }
.jalon-step.done::after { background: var(--success); }
.jalon-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); z-index: 1; position: relative; }
.jalon-step.done .jalon-dot { background: var(--success); border-color: var(--success); color: white; }
.jalon-step.current .jalon-dot { background: var(--primary); border-color: var(--primary); color: white; animation: pulse 2s infinite; }
.jalon-label { font-size: 10px; font-weight: 600; margin-top: 4px; color: var(--muted); text-align: center; }
.jalon-time { font-size: 10px; color: var(--muted); margin-top: 1px; }
.jalon-step.done .jalon-label { color: var(--success); }
.jalon-step.current .jalon-label { color: var(--primary); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(26,58,92,0.4)} 50%{box-shadow:0 0 0 6px rgba(26,58,92,0)} }

/* Duree pill */
.duree-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
.duree-ok { background: #D1FAE5; color: #065F46; }
.duree-warn { background: #FEF3C7; color: #92400E; }
.duree-bad { background: #FEE2E2; color: #991B1B; }

/* KPI cards */
.kpi-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; text-align: center; }
.kpi-value { font-size: 36px; font-weight: 800; line-height: 1; }
.kpi-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
.kpi-ok { color: var(--success); }
.kpi-warn { color: var(--warning); }
.kpi-bad { color: var(--danger); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(240,244,248,0.6); }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty svg { width: 40px; height: 40px; margin: 0 auto 12px; opacity: 0.3; display: block; }
.empty p { font-size: 14px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal { background: white; border-radius: 14px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--primary); }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* Motifs checklist */
.motif-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.motif-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; font-size: 13px; transition: all 0.1s; }
.motif-item:hover { border-color: var(--primary-light); background: rgba(42,82,152,0.04); }
.motif-item.selected { border-color: var(--warning); background: #FEF3C7; }
.motif-item input { accent-color: var(--warning); }

/* Photo preview */
.photo-preview { width: 100%; max-height: 160px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); margin-top: 8px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 9999; animation: slideUp 0.3s ease; max-width: 340px; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Loader */
.loader { display: inline-block; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Retard alerte */
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: flex; gap: 8px; align-items: flex-start; }
.alert-warning { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
.alert-danger { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
.alert-info { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }

/* Scan zone */
.scan-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.15s; }
.scan-zone:hover { border-color: var(--primary-light); background: rgba(42,82,152,0.04); }
.scan-zone.active { border-color: var(--success); background: rgba(39,174,96,0.04); }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#1a3a5c"/>
        <rect x="8" y="18" width="28" height="16" rx="3" fill="white" opacity="0.15"/>
        <rect x="8" y="18" width="28" height="16" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
        <path d="M14 18v-4a8 8 0 0 1 16 0v4" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="15" cy="30" r="2.5" fill="#e67e22"/>
        <circle cx="29" cy="30" r="2.5" fill="#e67e22"/>
        <path d="M20 27h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="login-logo-text">
        <h1>DMC Livraisons</h1>
        <span>Gestion des expéditions</span>
      </div>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center;">Connectez-vous avec votre compte professionnel @dmcsen.com</p>

    <div id="login-loading" class="hidden" style="text-align:center;padding:12px 0;">
      <div style="display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top:3px solid var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <p style="font-size:13px;color:var(--muted);margin-top:8px;">Vérification en cours...</p>
    </div>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:4px;">Seuls les comptes @dmcsen.com autorisés sont acceptés.</p>
    <p class="error-msg hidden" id="login-error" style="text-align:center;">Compte introuvable. Vérifiez votre sélection.</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="layout hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 32 32" fill="none" width="32" height="32">
        <rect width="32" height="32" rx="7" fill="white" opacity="0.15"/>
        <path d="M6 13h20M6 19h20M10 13v6M22 13v6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="11" cy="22" r="2" fill="#e67e22"/>
        <circle cx="21" cy="22" r="2" fill="#e67e22"/>
      </svg>
      <div class="sidebar-logo-text">DMC Livraisons <span>Gestion expéditions</span></div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sb-user-name">—</div>
      <div class="sidebar-user-role" id="sb-user-role">—</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-bottom">
      <button onclick="doLogout()">⬅ Déconnexion</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div id="page-container"></div>
  </main>
</div>

<!-- MODALS -->
<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJ7zAiWOGniCg1dSDRfwEtO8oJifKIMNSaLfPtsoU4C-XT-hJehAc3g-Jx37pWWSyc/exec"; // ← À remplacer après déploiement

const ZONES = ["Showroom", "Parc Acier", "Dépôt Quincaillerie", "Parc", "Dépôt"];
const ALL_ROLES = [
  { value: "admin", label: "Administrateur" },
  { value: "commercial", label: "Commercial" },
  { value: "responsable", label: "Responsable" },
  { value: "chef_poste", label: "Chef de Poste" },
  { value: "controleur", label: "Contrôleur" },
];
const SITES = ["Dakar", "Diamniadio"];
const ROLE_LABELS = {
  admin: "Administrateur", commercial: "Commercial",
  responsable: "Resp. Prépa/Livraison", chef_poste: "Chef de Poste",
  controleur: "Contrôleur"
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentUser = null;
let currentPage = null;
let allCommandes = [];
let allMotifs = [];
let refreshInterval = null;

// ─── API ─────────────────────────────────────────────────────────────────────
// Toutes les requêtes passent en GET pour éviter le blocage CORS preflight.
// Apps Script accepte les paramètres URL aussi bien pour les lectures que les mutations.
async function api(action, params = {}) {
  const url = new URL(SCRIPT_URL);
  url.searchParams.set("action", action);
  // Sérialiser les valeurs complexes (tableaux/objets) en JSON string
  // Les data: URLs (photos base64) sont ignorées — trop longues pour une URL GET
  Object.entries(params).forEach(([k, v]) => {
    if (typeof v === "string" && v.startsWith("data:")) return; // skip base64 photos
    url.searchParams.set(k, typeof v === "object" ? JSON.stringify(v) : v);
  });
  const res = await fetch(url.toString(), { redirect: "follow" });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ─── GOOGLE SIGN-IN ────────────────────────────────────────────────────────
const GOOGLE_CLIENT_ID = "556636859215-9iar5eql2ocjka6oavt9kakq1fap3lp3.apps.googleusercontent.com"; // ← À remplacer

function initGoogleSignIn() {
  if (typeof google === "undefined" || !google.accounts) {
    setTimeout(initGoogleSignIn, 200);
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false,
    hosted_domain: "dmcsen.com",
  });
  google.accounts.id.renderButton(
    document.getElementById("google-signin-btn"),
    { theme: "outline", size: "large", width: 300, text: "signin_with", locale: "fr" }
  );
}

async function handleGoogleCredential(response) {
  const errEl = document.getElementById("login-error");
  const loadingEl = document.getElementById("login-loading");
  const btnEl = document.getElementById("google-signin-btn");
  errEl.classList.add("hidden");
  btnEl.style.display = "none";
  loadingEl.classList.remove("hidden");

  try {
    const credential = response.credential;
    if (!credential) throw new Error("Pas de token reçu de Google.");
    
    // Envoyer le token au backend Apps Script pour vérification
    const user = await api("googleLogin", { credential });
    loadingEl.classList.add("hidden");
    btnEl.style.display = "flex";
    
    if (user.error) {
      errEl.textContent = user.error;
      errEl.classList.remove("hidden");
      return;
    }
    currentUser = user;
    startApp();
  } catch(e) {
    loadingEl.classList.add("hidden");
    btnEl.style.display = "flex";
    errEl.textContent = "Erreur de connexion : " + e.message;
    errEl.classList.remove("hidden");
  }
}

function doLogout() {
  currentUser = null;
  clearInterval(refreshInterval);
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login-screen").classList.remove("hidden");
  // Réinitialiser Google Sign-In
  if (typeof google !== "undefined" && google.accounts) {
    google.accounts.id.disableAutoSelect();
  }
}

window.addEventListener("load", initGoogleSignIn);

function showErr(id) { document.getElementById(id).classList.remove("hidden"); }

// ─── APP INIT ────────────────────────────────────────────────────────────────
async function startApp() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("login-error").classList.add("hidden");

  document.getElementById("sb-user-name").textContent = currentUser.nom;
  document.getElementById("sb-user-role").textContent = ROLE_LABELS[currentUser.role] || currentUser.role;

  buildSidebar();
  allMotifs = await api("getMotifsRetard");

  // Rafraîchir le badge retard en arrière-plan
  refreshBadgeRetard();
  setInterval(refreshBadgeRetard, 60000);

  // Page par défaut selon le rôle, ou deep-link via hash
  const hash = window.location.hash.replace("#", "").trim();
  const deepLinkPage = hash && ["file","nouvelle-demande","responsable","justificatifs","poste-garde","dashboard","utilisateurs","config"].includes(hash) ? hash : null;

  if (deepLinkPage) {
    navigateTo(deepLinkPage);
  } else {
    const defaults = {
      commercial: "file",
      responsable: "justificatifs", // arrivent directement sur les justificatifs
      chef_poste: "poste-garde",
      controleur: "justificatifs",
      admin: "file",
    };
    navigateTo(defaults[currentUser.role] || "file");
  }

  // Rafraîchissement auto toutes les 30s
  refreshInterval = setInterval(() => { if (currentPage) renderCurrentPage(); }, 30000);
}

let badgeRetard = 0;

function buildSidebar() {
  const role = currentUser.role;
  const nav = [
    { id: "file", label: "File des expéditions", icon: iconList, roles: ["commercial","responsable","chef_poste","admin","controleur"] },
    { id: "nouvelle-demande", label: "Nouvelle demande", icon: iconPlus, roles: ["commercial","admin"] },
    { id: "responsable", label: "Prépa & Livraison", icon: iconWrench, roles: ["responsable","admin"] },
    { id: "justificatifs", label: "Justificatifs retard", icon: iconWarning, roles: ["responsable","controleur","admin"], badge: true },

function renderCmdCard(cmd) {
  const exps = cmd.expeditions || [];
  const enRetard = exps.some(e => {
    if (!e.t0 || e.statut === "sortie") return false;
    const mins = Math.round((Date.now() - new Date(e.t0)) / 60000);
    return mins > 30;
  });

  return `
    <div class="card card-cmd ${enRetard ? "card-retard" : ""}" style="margin-bottom:14px">
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <span style="font-weight:700;font-size:15px;color:var(--primary)">${cmd.numCmdNav || "Sans N° Cmd"}</span>
            <span style="color:var(--muted);font-size:13px;margin-left:8px">${cmd.site || ""}</span>
            ${enRetard ? '<span style="color:var(--warning);font-size:12px;font-weight:600;margin-left:8px">⏰ Retard</span>' : ""}
          </div>
          <span style="font-size:12px;color:var(--muted)">${fmtDateTime(cmd.createdAt)}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${exps.map(exp => renderExpRow(exp, cmd)).join("")}
        </div>
      </div>
    </div>
  `;
}

function renderExpRow(exp, cmd) {
  const duree = exp.t0 ? Math.round((Date.now() - new Date(exp.t0)) / 60000) : null;
  const dureeT03 = exp.t0 && exp.t3 ? Math.round((new Date(exp.t3) - new Date(exp.t0)) / 60000) : null;
  const enRetard = duree !== null && !exp.t3 && duree > 30;
  const dureeClass = dureeT03 !== null ? (dureeT03 <= 30 ? "duree-ok" : "duree-bad") : (enRetard ? "duree-warn" : "");

  return `
    <div style="background:var(--bg);border-radius:8px;padding:12px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:700;font-family:monospace;font-size:14px">${exp.numExpedition}</span>
          <span style="font-size:12px;color:var(--muted)">${exp.zone}</span>
          ${exp.statut !== "sortie" && duree !== null ? `<span class="duree-pill ${dureeClass}">${fmtDuree(duree)}</span>` : ""}
          ${dureeT03 !== null ? `<span class="duree-pill ${dureeClass}">✓ ${fmtDuree(dureeT03)}</span>` : ""}
        </div>
        ${renderBadge(exp.statut)}
      </div>
      ${renderJalonTrack(exp)}
      ${renderExpActions(exp, cmd)}
    </div>
  `;
}

function renderJalonTrack(exp) {
  const jalons = [
    { key:"t0", label:"T0", desc:"Instruction" },
    { key:"t1", label:"T1", desc:"Feu vert" },
    { key:"t2", label:"T2", desc:"Fin prépa" },
    { key:"t3", label:"T3", desc:"Sortie" },
  ];
  const currentIdx = jalons.reduce((acc, j, i) => exp[j.key] ? i : acc, -1);
  return `
    <div class="jalon-track">
      ${jalons.map((j, i) => `
        <div class="jalon-step ${i <= currentIdx ? "done" : ""} ${i === currentIdx+1 ? "current" : ""}">
          <div class="jalon-dot">${i <= currentIdx ? "✓" : j.label}</div>
          <div class="jalon-label">${j.desc}</div>
          ${exp[j.key] ? `<div class="jalon-time">${fmtTime(exp[j.key])}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function renderExpActions(exp, cmd) {
  const role = currentUser.role;
  const actions = [];

  // Commercial : feu vert T1
  if ((role === "commercial" || role === "admin") && exp.t0 && !exp.t1 && exp.statut === "en_attente") {
    actions.push(`<button class="btn btn-success btn-sm" onclick="openFeuVert('${exp.id}','${exp.numExpedition}')">✅ Donner le feu vert</button>`);
  }
  // Responsable : T2
  if ((role === "responsable" || role === "admin") && exp.t1 && !exp.t2) {
    actions.push(`<button class="btn btn-warning btn-sm" onclick="openT2('${exp.id}','${exp.numExpedition}')">📦 Fin de livraison parc</button>`);
  }
  // Chef poste : T3
  if ((role === "chef_poste" || role === "admin") && exp.t2 && !exp.t3) {
    actions.push(`<button class="btn btn-primary btn-sm" onclick="openT3('${exp.id}','${exp.numExpedition}')">🚗 Valider sortie</button>`);
  }
  // Responsable : justifier retard (si sortie sans motif et retard)
  if ((role === "responsable" || role === "admin") && exp.t3 && !exp.motifRetard) {
    const dureeT03 = exp.t0 && exp.t3 ? Math.round((new Date(exp.t3) - new Date(exp.t0)) / 60000) : 0;
    if (dureeT03 > 30) {
      actions.push(`<button class="btn btn-danger btn-sm" onclick="openJustifRetard('${exp.id}','${exp.numExpedition}')">⚠️ Justifier retard</button>`);
    }
  }

  if (!actions.length) return "";
  return `<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">${actions.join("")}</div>`;
}

function addExpField() {
  const list = document.getElementById("exp-list");
  const idx = list.children.length;
  const div = document.createElement("div");
  div.className = "exp-group";
  div.id = `exp-group-${idx}`;
  div.innerHTML = `
    <div class="exp-row">
      <div class="form-group">
        <label class="form-label">N° Expédition *</label>

      </div>
      <div class="form-group">

        <select class="form-select exp-zone">
          <option value="">Choisir…</option>
          ${ZONES.map(z=>`<option value="${z}">${z}</option>`).join("")}
        </select>
      </div>
      ${idx > 0 ? `<button class="btn btn-danger btn-sm exp-remove" onclick="removeExpField(${idx})" style="margin-bottom:0;flex-shrink:0">✕</button>` : ""}
    </div>
  `;
  list.appendChild(div);

function removeExpField(idx) {
  document.getElementById(`exp-group-${idx}`)?.remove();
}

function autoFormat(input, prefix) {
  let v = input.value.toUpperCase();
  if (!v.startsWith(prefix)) {
    v = prefix + v.replace(new RegExp("^" + prefix, "i"), "");
  }
  input.value = v;
}

async function submitNouvelleDemande() {
  const numCmdNav = document.getElementById("nd-cmdnav").value.trim();
  const site = document.getElementById("nd-site").value;
  const errEl = document.getElementById("nd-error");

  // Collecter les expéditions
  const expGroups = document.querySelectorAll(".exp-group");
  const expeditions = [];
  let valid = true;

  expGroups.forEach(g => {
    const num = g.querySelector(".exp-num").value.trim();
    const zone = g.querySelector(".exp-zone").value;
    if (!num || !zone) { valid = false; return; }
    if (!num.match(/^EX-\d+$/)) { valid = false; return; }
    expeditions.push({ numExpedition: num, zone });
  });

  if (!valid || !expeditions.length) { errEl.textContent = "Vérifiez les N° d'expédition (format EX-XXXXX) et les zones."; errEl.classList.remove("hidden"); return; }

  errEl.classList.add("hidden");
  const btn = document.getElementById("nd-submit");
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Envoi…';

  try {
    await api("createCommande", {
      numCmdNav: numCmdNav || "",
      site,
      commercialEmail: currentUser.email,
      commercialNom: currentUser.nom,
      expeditions,
    });
    showToast("Instruction envoyée — notification Chat envoyée", "success");
    navigateTo("file");
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove("hidden");
    btn.disabled = false;
    btn.innerHTML = '🚀 Envoyer l\'instruction de préparation';
  }
}

        <label class="form-label">N° Bon de Livraison * <span>(scan QR ou saisie)</span></label>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="t3-bl" placeholder="BL-2504664 ou scanner…" style="font-family:monospace">
          <button class="btn btn-outline btn-sm" onclick="activateScan()" title="Mode scan douchette">⬛ QR</button>
        </div>
        <div id="scan-status" class="form-hint hidden" style="color:var(--success)">Mode scan actif — pointez la douchette vers le QR code</div>
      </div>
      <div class="form-group">
        <label class="form-label">Photo du BL <span>(facultatif)</span></label>
        <div class="scan-zone" onclick="document.getElementById('t3-photo-input').click()">
          📷 Appuyez pour prendre une photo ou importer
          <input type="file" id="t3-photo-input" accept="image/*" capture="environment" class="hidden" onchange="previewPhoto(this)">
        </div>
        <img id="t3-photo-preview" class="photo-preview hidden">
      </div>
      <div id="t3-retard-info" class="alert alert-warning hidden" style="margin-bottom:4px">
        ⚠️ Ce véhicule sera marqué en retard. Le responsable de dépôt sera notifié pour justifier.
      </div>
      <div id="t3-error" class="form-error hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-success" onclick="submitT3('${expId}')">✅ Confirmer la sortie</button>
    </div>
  `);

  // Afficher le message retard si déjà > 30 min depuis T0
  const exp = (allCommandes.flatMap(c=>c.expeditions||[])).find(e=>e.id===expId);
  if (exp && exp.t0) {
    const mins = Math.round((Date.now() - new Date(exp.t0)) / 60000);
    if (mins > 30) document.getElementById("t3-retard-info").classList.remove("hidden");
  }
}

function activateScan() {
  const input = document.getElementById("t3-bl");
  const status = document.getElementById("scan-status");
  input.focus();
  status.classList.remove("hidden");
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("t3-photo-preview");
    img.src = e.target.result;
    img.classList.remove("hidden");
  };
  reader.readAsDataURL(file);
}

async function submitT3(expId) {
  const plaque = document.getElementById("t3-plaque").value.trim();
  const chauffeur = document.getElementById("t3-chauffeur").value.trim();
  const numeroBL = document.getElementById("t3-bl").value.trim();
  const photoBlUrl = document.getElementById("t3-photo-preview").src || "";
  const errEl = document.getElementById("t3-error");

  if (!plaque) { errEl.textContent = "Plaque d'immatriculation obligatoire."; errEl.classList.remove("hidden"); return; }
  if (!numeroBL) { errEl.textContent = "N° de Bon de Livraison obligatoire."; errEl.classList.remove("hidden"); return; }

  errEl.classList.add("hidden");

  try {
    const result = await api("jalon_t3", {
      expId,
      acteurEmail: currentUser.email,
      acteurNom: currentUser.nom,
      plaque,
      chauffeur,
      numeroBL,
      photoBlUrl: photoBlUrl.startsWith("data:") ? photoBlUrl : "",
    });
    closeModal();
    const msg = result.enRetard
      ? "Sortie validée — en retard, le responsable de dépôt sera notifié pour justifier"
      : "Sortie validée (T3) — notification envoyée";
    showToast(msg, result.enRetard ? "warning" : "success");
    renderCurrentPage();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove("hidden");
  }
}

// Justifier retard
function openJustifRetard(expId, numExp) {
  const motifsHtml = allMotifs.map(m => `
    <label class="motif-item" onclick="this.classList.toggle('selected');this.querySelector('input').checked=!this.querySelector('input').checked">
      <input type="checkbox" value="${m.libelle}" style="display:none"> ${m.libelle}
    </label>
  `).join("");

  openModal(`
    <div class="modal-header">
      <div class="modal-title">⚠️ Justifier retard — ${numExp}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-warning">Cette expédition est sortie avec un délai supérieur à 30 minutes. Veuillez justifier le retard.</div>
      <div class="form-group">
        <label class="form-label">Motif(s) *</label>
        <div class="motif-grid">${motifsHtml}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Commentaire</label>
        <textarea class="form-textarea" id="justif-commentaire" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-warning" onclick="submitJustif('${expId}')">Enregistrer</button>
    </div>
  `);
}

async function submitJustif(expId) {
  const motifs = [...document.querySelectorAll(".motif-item.selected input")].map(i => i.value);
  const commentaire = document.getElementById("justif-commentaire").value;
  if (!motifs.length) { showToast("Choisissez au moins un motif", "error"); return; }
  await api("justifierRetard", { expId, motifRetard: motifs, commentaireRetard: commentaire, acteurEmail: currentUser.email });
  closeModal();
  showToast("Retard justifié — merci", "success");
  await refreshBadgeRetard();
  renderCurrentPage(); // reste sur justificatifs pour traiter les suivants
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay" onclick="closeModalIfOverlay(event)">
      <div class="modal">${html}</div>
    </div>
  `;
}
function closeModal() { document.getElementById("modal-container").innerHTML = ""; }
function closeModalIfOverlay(e) { if (e.target.classList.contains("modal-overlay")) closeModal(); }

// ─── UTILS ───────────────────────────────────────────────────────────────────
function showToast(msg, type = "") {
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmtTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit"});
}
function fmtDateTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString("fr-FR", {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}
function fmtDuree(mins) {
  if (mins === null || mins === undefined) return "—";
  if (mins < 60) return mins + " min";
  return Math.floor(mins/60) + "h" + String(mins%60).padStart(2,"0");
}
function kpiColor(pct) {
  if (pct === null) return "";
  if (pct >= 80) return "kpi-ok";
  if (pct >= 60) return "kpi-warn";
  return "kpi-bad";
}
function kpiColorClass(pct) {
  if (pct === null) return "";
  if (pct >= 80) return "duree-ok";
  if (pct >= 60) return "duree-warn";
  return "duree-bad";
}
function renderBadge(statut) {
  const labels = { en_attente:"En attente", feu_vert:"✅ Feu vert", prete:"Prête", sortie:"Sortie", terminee:"Terminée" };
  return `<span class="badge badge-${statut}">${labels[statut] || statut}</span>`;
}
