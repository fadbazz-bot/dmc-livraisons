<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMC Livraisons</title>
<style>
:root {
  --primary: #1a3a5c;
  --primary-light: #2a5298;
  --accent: #e67e22;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #d1dbe8;
  --text: #1a2332;
  --muted: #6b7c93;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Layout */
.layout { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.hidden { display: none !important; }

/* Login */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a3a5c 0%, #2a5298 100%); }
.login-card { background: white; border-radius: 16px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.login-logo svg { width: 44px; height: 44px; }
.login-logo-text h1 { font-size: 20px; font-weight: 700; color: var(--primary); }
.login-logo-text p { font-size: 12px; color: var(--muted); }
.login-card label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.login-card select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: white; margin-bottom: 20px; }
/* Onglets login */
.login-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
.login-tab { flex: 1; padding: 10px 8px; font-size: 13px; font-weight: 600; text-align: center; cursor: pointer; background: white; color: var(--muted); border: none; transition: background 0.2s, color 0.2s; }
.login-tab.active { background: var(--primary); color: white; }
.login-tab-panel { display: none; }
.login-tab-panel.active { display: block; }
/* Champ PIN */
.pin-input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 28px; font-weight: 700; letter-spacing: 10px; text-align: center; color: var(--primary); margin-bottom: 4px; box-sizing: border-box; }
.pin-input:focus { border-color: var(--primary); outline: none; }
.site-btns { display: flex; gap: 10px; margin-bottom: 20px; }
.site-btn { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 8px; background: white; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.2s; text-align: center; }
.site-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { filter: brightness(1.1); }
.btn-warning { background: var(--warning); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-outline { background: white; color: var(--primary); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }

/* Sidebar */
.sidebar-logo { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
.sidebar-logo svg { width: 32px; height: 32px; }
.sidebar-logo-text { font-size: 15px; font-weight: 700; line-height: 1.2; }
.sidebar-logo-text span { font-size: 11px; opacity: 0.6; font-weight: 400; display: block; }
.sidebar-user { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-user-name { font-size: 13px; font-weight: 600; }
.sidebar-user-role { font-size: 11px; opacity: 0.6; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 8px 0; }
.nav-section { padding: 12px 16px 4px; font-size: 10px; font-weight: 700; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.08em; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 13px; cursor: pointer; transition: background 0.1s; border-radius: 0; color: rgba(255,255,255,0.75); }
.nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
.nav-item.active { background: rgba(255,255,255,0.15); color: white; font-weight: 600; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-bottom { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1); }
.sidebar-bottom button { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; padding: 6px 0; }
.sidebar-bottom button:hover { color: white; }
.nav-badge { background: #e74c3c; color: white; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; margin-left: auto; animation: pulse 2s infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Sélection multiple */
.exp-selectable { cursor:pointer; }
.exp-selectable:hover { box-shadow: 0 0 0 2px var(--primary-light); }
.exp-selectable.selected { box-shadow: 0 0 0 2px var(--success); background: #f0fdf4; }
.exp-checkbox { width:18px; height:18px; cursor:pointer; accent-color: var(--success); flex-shrink:0; }
.bulk-bar { position:sticky; bottom:0; background:var(--primary); color:white; padding:12px 24px; display:flex; align-items:center; gap:12px; z-index:100; border-top:2px solid var(--primary-light); }
.bulk-bar-count { font-weight:700; font-size:14px; flex:1; }
.search-bar { position:relative; }
.search-bar input { padding-left:32px; }
.search-bar svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }

/* Header */
.page-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 17px; font-weight: 700; color: var(--primary); }
.page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* Cards */
.page-content { padding: 24px; flex: 1; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
.card-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
.card-title { font-size: 14px; font-weight: 700; color: var(--primary); }
.card-body { padding: 16px 20px; }
.card-cmd { transition: box-shadow 0.15s; }
.card-cmd:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.card-retard { border-left: 3px solid var(--warning); }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
.form-label span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 4px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: white; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(42,82,152,0.1); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
.form-error { font-size: 12px; color: var(--danger); margin-top: 4px; }

/* Expedition group */
.exp-group { background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.exp-row { display: flex; gap: 10px; align-items: flex-end; }
.exp-row .form-group { margin-bottom: 0; flex: 1; }
.exp-remove { flex-shrink: 0; }

/* Badge */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.badge-en_attente  { background: #FEF3C7; color: #92400E; }
.badge-feu_vert    { background: #D1FAE5; color: #065F46; }
.badge-prete       { background: #DBEAFE; color: #1E40AF; }
.badge-sortie      { background: #F3F4F6; color: #374151; }
.badge-terminee    { background: #D1FAE5; color: #065F46; }

/* Timeline jalons */
.jalon-track { display: flex; align-items: center; gap: 0; margin: 12px 0; }
.jalon-step { display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }
.jalon-step:not(:last-child)::after { content: ''; position: absolute; top: 14px; left: 50%; width: 100%; height: 2px; background: var(--border); z-index: 0; }
.jalon-step.done::after { background: var(--success); }
.jalon-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); z-index: 1; position: relative; }
.jalon-step.done .jalon-dot { background: var(--success); border-color: var(--success); color: white; }
.jalon-step.current .jalon-dot { background: var(--primary); border-color: var(--primary); color: white; animation: pulse 2s infinite; }
.jalon-label { font-size: 10px; font-weight: 600; margin-top: 4px; color: var(--muted); text-align: center; }
.jalon-time { font-size: 10px; color: var(--muted); margin-top: 1px; }
.jalon-step.done .jalon-label { color: var(--success); }
.jalon-step.current .jalon-label { color: var(--primary); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(26,58,92,0.4)} 50%{box-shadow:0 0 0 6px rgba(26,58,92,0)} }

/* Duree pill */
.duree-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
.duree-ok { background: #D1FAE5; color: #065F46; }
.duree-warn { background: #FEF3C7; color: #92400E; }
.duree-bad { background: #FEE2E2; color: #991B1B; }

/* KPI cards */
.kpi-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; text-align: center; }
.kpi-value { font-size: 36px; font-weight: 800; line-height: 1; }
.kpi-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
.kpi-ok { color: var(--success); }
.kpi-warn { color: var(--warning); }
.kpi-bad { color: var(--danger); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(240,244,248,0.6); }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty svg { width: 40px; height: 40px; margin: 0 auto 12px; opacity: 0.3; display: block; }
.empty p { font-size: 14px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal { background: white; border-radius: 14px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--primary); }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* Motifs checklist */
.motif-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.motif-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; font-size: 13px; transition: all 0.1s; }
.motif-item:hover { border-color: var(--primary-light); background: rgba(42,82,152,0.04); }
.motif-item.selected { border-color: var(--warning); background: #FEF3C7; }
.motif-item input { accent-color: var(--warning); }

/* Photo preview */
.photo-preview { width: 100%; max-height: 160px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); margin-top: 8px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 9999; animation: slideUp 0.3s ease; max-width: 340px; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Loader */
.loader { display: inline-block; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Sélection multiple */
.exp-selectable { cursor:pointer; }
.exp-selectable:hover { box-shadow: 0 0 0 2px var(--primary-light); }
.exp-selectable.selected { box-shadow: 0 0 0 2px var(--success); background: #f0fdf4; }
.exp-checkbox { width:18px; height:18px; cursor:pointer; accent-color: var(--success); flex-shrink:0; }
.bulk-bar { position:sticky; bottom:0; background:var(--primary); color:white; padding:12px 24px; display:flex; align-items:center; gap:12px; z-index:100; border-top:2px solid var(--primary-light); }
.bulk-bar-count { font-weight:700; font-size:14px; flex:1; }
.search-bar { position:relative; }
.search-bar input { padding-left:32px; }
.search-bar svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }

/* Retard alerte */
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: flex; gap: 8px; align-items: flex-start; }
.alert-warning { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
.alert-danger { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
.alert-info { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }

/* Scan zone */
.scan-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.15s; }
.scan-zone:hover { border-color: var(--primary-light); background: rgba(42,82,152,0.04); }
.scan-zone.active { border-color: var(--success); background: rgba(39,174,96,0.04); }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none !important; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .main { padding-bottom: 64px; }
  .page-header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  .page-title { font-size: 15px; }
  .page-content { padding: 12px; }
  .page-header > div:last-child { width: 100%; overflow-x: auto; }
  .page-header > div:last-child > * { flex-shrink: 0; }
  .card-body { padding: 12px 14px; }
  .card-header { padding: 12px 14px 10px; }
  .kpi-card { padding: 14px 10px; }
  .kpi-value { font-size: 26px; }
  .modal { max-width: 100%; margin: 0; border-radius: 14px 14px 0 0; max-height: 95vh; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .bulk-bar { padding: 10px 12px; flex-wrap: wrap; gap: 8px; bottom: 64px; }
  .login-card { width: 100%; max-width: 380px; padding: 28px 20px; }
  table { font-size: 12px; }
  th, td { padding: 8px 10px; }
  .btn { font-size: 13px; padding: 9px 14px; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .jalon-label { font-size: 9px; }
  .jalon-dot { width: 22px; height: 22px; }
}

/* Mobile nav */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--primary);
  z-index: 500;
  border-top: 1px solid rgba(255,255,255,0.12);
  align-items: stretch;
}
@media (max-width: 768px) {
  .mobile-nav { display: flex; }
}
.mobile-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: rgba(255,255,255,0.55);
  font-size: 10px;
  font-weight: 600;
  padding: 8px 4px;
  transition: all 0.15s;
  border: none;
  background: none;
  position: relative;
}
.mobile-nav-item svg { width: 20px; height: 20px; }
.mobile-nav-item.active { color: white; }
.mobile-nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
}
.mobile-nav-badge {
  position: absolute;
  top: 6px; right: calc(50% - 18px);
  background: #e74c3c;
  color: white;
  font-size: 9px;
  font-weight: 700;
  border-radius: 8px;
  padding: 1px 4px;
  min-width: 14px;
  text-align: center;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#1a3a5c"/>
        <rect x="8" y="18" width="28" height="16" rx="3" fill="white" opacity="0.15"/>
        <rect x="8" y="18" width="28" height="16" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
        <path d="M14 18v-4a8 8 0 0 1 16 0v4" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="15" cy="30" r="2.5" fill="#e67e22"/>
        <circle cx="29" cy="30" r="2.5" fill="#e67e22"/>
        <path d="M20 27h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="login-logo-text">
        <h1>DMC Livraisons</h1>
        <span>Gestion des expéditions</span>
      </div>
    </div>
    <!-- Onglets -->
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('google')">Compte Google</button>
      <button class="login-tab" onclick="switchLoginTab('pin')">Poste de garde</button>
    </div>

    <!-- Panneau Google -->
    <div class="login-tab-panel active" id="tab-google">
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;text-align:center;">Connectez-vous avec votre compte @dmcsen.com</p>
      <div id="google-signin-btn" style="display:flex;justify-content:center;margin-bottom:16px;"></div>
      <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:4px;">Seuls les comptes @dmcsen.com autorisés sont acceptés.</p>
    </div>

    <!-- Panneau PIN poste de garde -->
    <div class="login-tab-panel" id="tab-pin">
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;text-align:center;">Sélectionnez votre site puis entrez le code PIN</p>
      <div class="site-btns">
        <button class="site-btn" id="site-btn-dakar" onclick="selectSite('Dakar')">Dakar</button>
        <button class="site-btn" id="site-btn-diam" onclick="selectSite('Diamniadio')">Diamniadio</button>
      </div>
      <input class="pin-input" type="password" inputmode="numeric" maxlength="6" id="pin-input"
             placeholder="&#8226;&#8226;&#8226;&#8226;" onkeydown="if(event.key==='Enter')doPinLogin()" />
      <p style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:14px;">Code PIN numerique</p>
      <button class="btn btn-primary" onclick="doPinLogin()">Connexion</button>
    </div>

    <!-- Chargement commun -->
    <div id="login-loading" class="hidden" style="text-align:center;padding:12px 0;">
      <div style="display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top:3px solid var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <p style="font-size:13px;color:var(--muted);margin-top:8px;">Vérification en cours...</p>
    </div>
    <p class="error-msg hidden" id="login-error" style="text-align:center;">Erreur de connexion.</p>
  </div>
</div>

<nav class="mobile-nav" id="mobile-nav"></nav>

<!-- APP -->
<div id="app" class="layout hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 32 32" fill="none" width="32" height="32">
        <rect width="32" height="32" rx="7" fill="white" opacity="0.15"/>
        <path d="M6 13h20M6 19h20M10 13v6M22 13v6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="11" cy="22" r="2" fill="#e67e22"/>

// Toutes les requêtes passent en GET pour éviter le blocage CORS preflight.
// Apps Script accepte les paramètres URL aussi bien pour les lectures que les mutations.
async function api(action, params = {}) {
  const url = new URL(SCRIPT_URL);
  url.searchParams.set("action", action);
  // Sérialiser les valeurs complexes (tableaux/objets) en JSON string
  // Les data: URLs (photos base64) sont ignorées — trop longues pour une URL GET
  Object.entries(params).forEach(([k, v]) => {
    if (typeof v === "string" && v.startsWith("data:")) return; // skip base64 photos
    url.searchParams.set(k, typeof v === "object" ? JSON.stringify(v) : v);
  });
  const res = await fetch(url.toString(), { redirect: "follow" });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

const GOOGLE_CLIENT_ID = "556636859215-9iar5eql2ocjka6oavt9kakq1fap3lp3.apps.googleusercontent.com"; // ← À remplacer

function initGoogleSignIn() {
  if (typeof google === "undefined" || !google.accounts || !google.accounts.id) {
    // Réessayer toutes les 100ms jusqu'à ce que GIS soit chargé
    setTimeout(initGoogleSignIn, 100);
    return;
  }
  try {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleCredential,
      auto_select: false,
      hosted_domain: "dmcsen.com",
      cancel_on_tap_outside: false,
    });
    const btnContainer = document.getElementById("google-signin-btn");
    if (!btnContainer) { setTimeout(initGoogleSignIn, 100); return; }
    google.accounts.id.renderButton(btnContainer, {
      theme: "outline", size: "large", width: 300,
      text: "signin_with", locale: "fr", shape: "rectangular"
    });
  } catch(err) {
    console.error("GIS init error:", err);
    // Afficher un bouton de secours en cas d'échec GIS
    const btn = document.getElementById("google-signin-btn");
    if (btn) btn.innerHTML = '<button class="btn btn-primary" style="width:300px" onclick="gsiPrompt()">Se connecter avec Google</button>';
  }
}

function gsiPrompt() {
  if (typeof google !== "undefined" && google.accounts) {

}

async function handleGoogleCredential(response) {
  const errEl = document.getElementById("login-error");
  const loadingEl = document.getElementById("login-loading");
  const btnEl = document.getElementById("google-signin-btn");
  errEl.classList.add("hidden");
  btnEl.style.display = "none";
  loadingEl.classList.remove("hidden");

  try {
    const credential = response.credential;
    if (!credential) throw new Error("Pas de token reçu de Google.");
    
    // POST direct pour éviter la troncature des longs tokens en GET
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "action=googleLogin&credential=" + encodeURIComponent(credential),
    });
    const user = await res.json();
    loadingEl.classList.add("hidden");
    btnEl.style.display = "flex";
    
    if (user.error) {
      errEl.textContent = user.error;
      errEl.classList.remove("hidden");
      return;
    }
    currentUser = user;
    // Désactiver l'overlay GIS (One Tap) qui bloquerait les clics une fois connecté
    try { google.accounts.id.cancel(); } catch(e) {}
    startApp();
  } catch(e) {
    loadingEl.classList.add("hidden");
    btnEl.style.display = "flex";
    errEl.textContent = "Erreur de connexion : " + e.message;
    errEl.classList.remove("hidden");
  }
}

async function doPinLogin() {
  const errEl  = document.getElementById("login-error");
  const loadEl = document.getElementById("login-loading");
  const pin    = document.getElementById("pin-input").value.trim();

  errEl.classList.add("hidden");

  if (!selectedSite) {
    errEl.textContent = "Veuillez sélectionner un site (Dakar ou Diamniadio).";
    errEl.classList.remove("hidden");
    return;
  }
  if (!pin) {
    errEl.textContent = "Veuillez entrer votre code PIN.";
    errEl.classList.remove("hidden");
    return;
  }

  loadEl.classList.remove("hidden");
  try {
    const url = `${SCRIPT_URL}?action=pinLogin&site=${encodeURIComponent(selectedSite)}&pin=${encodeURIComponent(pin)}`;
    const res  = await fetch(url, { redirect: "follow" });
    const user = await res.json();
    loadEl.classList.add("hidden");

    if (user.error) {
      errEl.textContent = user.error;
      errEl.classList.remove("hidden");
      document.getElementById("pin-input").value = "";
      return;
    }
    currentUser = user;
    startApp();
  } catch(e) {
    loadEl.classList.add("hidden");
    errEl.textContent = "Erreur de connexion : " + e.message;
    errEl.classList.remove("hidden");
  }
}

async function startApp() {

  // Rafraîchir le badge retard en arrière-plan
  refreshBadgeRetard();
  setInterval(refreshBadgeRetard, 60000);

  // Page par défaut selon le rôle, ou deep-link via hash
  const hash = window.location.hash.replace("#", "").trim();
  const deepLinkPage = hash && ["file","nouvelle-demande","responsable","justificatifs","poste-garde","dashboard","utilisateurs","config"].includes(hash) ? hash : null;

  if (deepLinkPage) {
    navigateTo(deepLinkPage);
  } else {
    const defaults = {
      commercial: "file",
      responsable: "justificatifs", // arrivent directement sur les justificatifs
      chef_poste: "poste-garde",
      controleur: "justificatifs",
      admin: "file",
    };
    navigateTo(defaults[currentUser.role] || "file");
  }

  // Rafraîchissement auto toutes les 30s — sauf sur les pages avec formulaires de saisie
  refreshInterval = setInterval(() => {
    const noRefreshPages = ["nouvelle-demande"];
    if (currentPage && !noRefreshPages.includes(currentPage)) renderCurrentPage();
  }, 30000);
}

  const mnavEl = document.getElementById("mnav-" + page);
  if (mnavEl) mnavEl.classList.add("active");

  renderCurrentPage();
}

async function renderCurrentPage() {
  // Ne pas reconstruire si une modale est ouverte
  const modalOpen = document.getElementById("modal-container")?.children.length > 0;
  if (modalOpen) return;

  // Ne pas reconstruire si un champ texte est actif (saisie en cours)
  const active = document.activeElement;
  const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
  if (isTyping) return; // ne pas reconstruire si l'utilisateur est en train de saisir

  const pages = {
    "file": renderFile,
    "nouvelle-demande": renderNouvelleDemande,
    "responsable": renderResponsable,
    "justificatifs": renderJustificatifs,
    "utilisateurs": renderUtilisateurs,
    "poste-garde": renderPosteGarde,
    "dashboard": renderDashboard,
    "config": renderConfig,
  };
  const fn = pages[currentPage];
  if (fn) await fn();
}

function updateBulkBar() {
  const bar = document.getElementById("bulk-bar");
  const countEl = document.getElementById("bulk-count");
  const btn = document.getElementById("bulk-action-btn");
  if (!bar) return;
  const n = selectedExpIds.size;
  if (n === 0) { bar.classList.add("hidden"); return; }
  bar.classList.remove("hidden");
  countEl.textContent = n + " expédition(s) sélectionnée(s)";
  // Détecter le type d'action selon les exps sélectionnées
  const allExps = allCommandes.flatMap(c => c.expeditions || []);
  const sel = [...selectedExpIds].map(id => allExps.find(e => e.id === id)).filter(Boolean);
  const role = currentUser.role;
  if ((role === "commercial" || role === "admin") && sel.every(e => e.t0 && !e.t1 && e.statut === "en_attente")) {
    btn.textContent = "✅ Feu vert groupé";
  } else if ((role === "responsable" || role === "admin") && sel.every(e => e.t1 && !e.t2)) {
    btn.textContent = "✅ Fin de livraison groupée";
  } else if ((role === "chef_poste" || role === "admin") && sel.every(e => e.t2 && !e.t3)) {
    btn.textContent = "🚗 Valider sortie groupée";
  } else {
    btn.textContent = "Valider la sélection (" + n + ")";
  }
}

function toggleExpSelection(expId, el) {
  if (selectedExpIds.has(expId)) {
    selectedExpIds.delete(expId);
    el.classList.remove("selected");

    selectedExpIds.add(expId);
    el.classList.add("selected");

  updateBulkBar();
}

function clearSelection() {
  selectedExpIds.clear();
  document.querySelectorAll(".exp-selectable.selected").forEach(el => el.classList.remove("selected"));

  if (!listEl) return;

  // Tous les sélecteurs de card possibles
  const cards = [...listEl.querySelectorAll(".resp-card, .garde-card, .justif-card")];

  // Filtre
  cards.forEach(card => {
    const cardMag = (card.dataset.magasin || "").toLowerCase();
    const visible = !magasin || cardMag === magasin;
    card.style.display = visible ? "" : "none";
  });

  // Tri
  if (!sortOrder) return;
  const visible = cards.filter(c => c.style.display !== "none");
  const hidden = cards.filter(c => c.style.display === "none");
  visible.sort((a, b) => {
    const la = a.dataset.magasinLabel || "";
    const lb = b.dataset.magasinLabel || "";
    if (sortOrder === "magasin-az") return la.localeCompare(lb, "fr");
    if (sortOrder === "magasin-za") return lb.localeCompare(la, "fr");
    return 0;
  });
  [...visible, ...hidden].forEach(card => listEl.appendChild(card));
}

function filterFile() {
  const q = (document.getElementById("search-exp")?.value || "").toLowerCase().trim();
  const magasin = (document.getElementById("filter-magasin")?.value || "").toLowerCase();
  const sortOrder = document.getElementById("sort-order")?.value || "";

  // 1. Filtrer visibilité
  document.querySelectorAll(".cmd-card-wrap").forEach(cardEl => {
    let anyVisible = false;
    cardEl.querySelectorAll(".exp-row-wrap").forEach(rowEl => {
      const text = rowEl.dataset.search || "";
      const rowMagasin = rowEl.dataset.magasin || "";
      const matchQ = !q || text.includes(q) || rowEl.dataset.magasinLabel?.toLowerCase().includes(q);
      const matchMag = !magasin || rowMagasin === magasin;
      const visible = matchQ && matchMag;
      rowEl.style.display = visible ? "" : "none";
      if (visible) anyVisible = true;
    });
    cardEl.style.display = anyVisible ? "" : "none";
  });

  // 2. Tri
  if (!sortOrder) return;
  const fileList = document.getElementById("file-list");
  if (!fileList) return;
  const cards = [...fileList.querySelectorAll(".cmd-card-wrap")];
  cards.sort((a, b) => {
    const getLabel = el => (el.querySelector(".exp-row-wrap[style='']:not([style='display: none;'])") || el.querySelector(".exp-row-wrap"))?.dataset?.magasinLabel || "";
    const getT0 = el => el.querySelector(".exp-row-wrap")?.dataset?.t0 || "";
    if (sortOrder === "magasin-az") return getLabel(a).localeCompare(getLabel(b), "fr");
    if (sortOrder === "magasin-za") return getLabel(b).localeCompare(getLabel(a), "fr");
    if (sortOrder === "recent") return getT0(b).localeCompare(getT0(a));
    if (sortOrder === "ancien") return getT0(a).localeCompare(getT0(b));
    return 0;
  });
  cards.forEach(card => fileList.appendChild(card));
}

function renderCmdCard(cmd) {
  const exps = cmd.expeditions || [];
  const enRetard = exps.some(e => {
    if (!e.t0 || e.statut === "sortie") return false;
    const mins = Math.round((Date.now() - new Date(e.t0)) / 60000);
    return mins > 30;
  });

  return `
    <div class="cmd-card-wrap card card-cmd ${enRetard ? "card-retard" : ""}" style="margin-bottom:14px">
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <span style="font-weight:700;font-size:15px;color:var(--primary)">${cmd.numCmdNav || "Sans N° Cmd"}</span>
            ${cmd.nomClient ? `<span style="font-size:13px;margin-left:8px;color:var(--text)">· ${cmd.nomClient}</span>` : ''}
            <span style="color:var(--muted);font-size:13px;margin-left:8px">${cmd.site || ""}</span>
            ${enRetard ? '<span style="color:var(--warning);font-size:12px;font-weight:600;margin-left:8px">⏰ Retard</span>' : ""}
          </div>
          <span style="font-size:12px;color:var(--muted)">${fmtDateTime(cmd.createdAt)}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${exps.map(exp => renderExpRow(exp, cmd)).join("")}
        </div>
      </div>
    </div>
  `;
}

function renderExpRow(exp, cmd) {
  const duree = exp.t0 ? Math.round((Date.now() - new Date(exp.t0)) / 60000) : null;
  const dureeT03 = exp.t0 && exp.t3 ? Math.round((new Date(exp.t3) - new Date(exp.t0)) / 60000) : null;
  const enRetard = duree !== null && !exp.t3 && duree > 30;
  const dureeClass = dureeT03 !== null ? (dureeT03 <= 30 ? "duree-ok" : "duree-bad") : (enRetard ? "duree-warn" : "");

  return `
    <div class="exp-row-wrap exp-selectable" data-search="${(exp.numExpedition + ' ' + exp.zone + ' ' + (cmd.numCmdNav||'') + ' ' + (cmd.site||'')).toLowerCase()}" data-magasin="${(exp.magasin||'').toLowerCase()}" data-magasin-label="${(MAGASINS.find(m=>m.id===exp.magasin)||{label:exp.zone}).label}" data-exp-id="${exp.id}" onclick="handleExpRowClick(event,'${exp.id}',this)" style="background:var(--bg);border-radius:8px;padding:12px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          ${canSelectExp(exp) ? `<input type="checkbox" class="exp-checkbox" onclick="event.stopPropagation();toggleExpSelection('${exp.id}',this.closest('.exp-selectable'))">` : ''}
          <span style="font-weight:700;font-family:monospace;font-size:14px">${expLabel(exp, cmdsMap)}</span>
          <span style="font-size:12px;color:var(--muted)">${exp.zone}</span>
          ${exp.statut !== "sortie" && duree !== null ? `<span class="duree-pill ${dureeClass}">${fmtDuree(duree)}</span>` : ""}
          ${dureeT03 !== null ? `<span class="duree-pill ${dureeClass}">✓ ${fmtDuree(dureeT03)}</span>` : ""}
        </div>
        ${renderBadge(exp.statut)}
      </div>
      ${renderJalonTrack(exp)}
      ${renderExpActions(exp, cmd)}
    </div>
  `;
}

function canSelectExp(exp) {
  const role = currentUser.role;
  if ((role === "commercial" || role === "admin") && exp.t0 && !exp.t1 && exp.statut === "en_attente") return true;
  if ((role === "responsable" || role === "admin") && exp.t1 && !exp.t2) return true;
  if ((role === "chef_poste" || role === "admin") && exp.t2 && !exp.t3) return true;
  return false;
}

function handleExpRowClick(event, expId, el) {
  // Ignorer les clics sur des boutons ou inputs
  if (event.target.tagName === "BUTTON" || event.target.tagName === "INPUT" || event.target.tagName === "SELECT" || event.target.closest("button")) return;
  // Trouver l'exp
  const allExps = allCommandes.flatMap(c => c.expeditions || []);
  const exp = allExps.find(e => e.id === expId);
  if (!exp || !canSelectExp(exp)) return;
  const cb = el.querySelector(".exp-checkbox");
  if (cb) { cb.checked = !cb.checked; }
  toggleExpSelection(expId, el);
}

function renderJalonTrack(exp) {
  const jalons = [
    { key:"t0", label:"T0", desc:"Instruction" },
    { key:"t1", label:"T1", desc:"Feu vert" },
    { key:"t2", label:"T2", desc:"Fin prépa" },
    { key:"t3", label:"T3", desc:"Sortie" },
  ];
  const currentIdx = jalons.reduce((acc, j, i) => exp[j.key] ? i : acc, -1);
  return `
    <div class="jalon-track">
      ${jalons.map((j, i) => `
        <div class="jalon-step ${i <= currentIdx ? "done" : ""} ${i === currentIdx+1 ? "current" : ""}">
          <div class="jalon-dot">${i <= currentIdx ? "✓" : j.label}</div>
          <div class="jalon-label">${j.desc}</div>
          ${exp[j.key] ? `<div class="jalon-time">${fmtTime(exp[j.key])}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function renderExpActions(exp, cmd) {
  const role = currentUser.role;
  const actions = [];

  // Commercial : feu vert T1
  if ((role === "commercial" || role === "admin") && exp.t0 && !exp.t1 && exp.statut === "en_attente") {
    actions.push(`<button class="btn btn-success btn-sm" onclick="event.stopPropagation();openFeuVertById('${exp.id}')">✅ Donner le feu vert</button>`);
  }
  // Responsable : T2
  if ((role === "responsable" || role === "admin") && exp.t1 && !exp.t2) {
    actions.push(`<button class="btn btn-warning btn-sm" onclick="event.stopPropagation();openT2ById('${exp.id}')">📦 Fin de livraison</button>`);
  }
  // Chef poste : T3
  if ((role === "chef_poste" || role === "admin") && exp.t2 && !exp.t3) {
    actions.push(`<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openT3ById('${exp.id}')">✅ Enregistrer fin de livraison</button>`);
  }
  // Responsable : justifier retard (si sortie sans motif et retard)
  if ((role === "responsable" || role === "admin") && exp.t3 && !exp.motifRetard) {
    const dureeT03 = exp.t0 && exp.t3 ? Math.round((new Date(exp.t3) - new Date(exp.t0)) / 60000) : 0;
    if (dureeT03 > 30) {
      actions.push(`<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();openJustifRetardById('${exp.id}')">⚠️ Justifier retard</button>`);
    }
  }

  if (!actions.length) return "";
  return `<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">${actions.join("")}</div>`;
}

function copyChauffeur(idx) {
  // Copie plaque/chauffeur/tel de la première expédition vers celle avec idx
  const groups = document.querySelectorAll(".exp-group");
  if (groups.length < 2) return;
  const src  = groups[0];
  const dest = document.getElementById(`exp-group-${idx}`);
  if (!dest) return;
  const srcPlaque    = src.querySelector(".exp-plaque")?.value || "";
  const srcChauffeur = src.querySelector(".exp-chauffeur")?.value || "";
  const srcTel       = src.querySelector(".exp-tel")?.value || "";
  if (dest.querySelector(".exp-plaque"))    dest.querySelector(".exp-plaque").value    = srcPlaque;
  if (dest.querySelector(".exp-chauffeur")) dest.querySelector(".exp-chauffeur").value = srcChauffeur;
  if (dest.querySelector(".exp-tel"))       dest.querySelector(".exp-tel").value       = srcTel;
  // Feedback visuel
  const btn = dest.querySelector("button[onclick*=copyChauffeur]");
  if (btn) { btn.textContent = "✅ Copié"; setTimeout(() => btn.textContent = "↳ Même chauffeur", 1500); }
}

function autoFormat(input, prefix) {
  // Garder la position du curseur pour ne pas perturber la saisie
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const prev = input.value;
  let v = prev.toUpperCase();

  // Si le texte ne commence pas encore par le préfixe, forcer le préfixe
  if (!v.startsWith(prefix.toUpperCase())) {
    // Enlever tout préfixe partiel déjà tapé
    const stripped = v.replace(new RegExp('^' + prefix.split('').map(c => c + '?').join(''), 'i'), '');
    v = prefix + stripped;
  }

  // Ne modifier input.value que si nécessaire pour éviter de casser la saisie
  if (v !== prev) {
    input.value = v;
    // Repositionner le curseur après le préfixe si on vient d'ajouter le préfixe
    const newPos = Math.max(prefix.length, start + (v.length - prev.length));
    try { input.setSelectionRange(newPos, newPos); } catch(e) {}
  }
}

async function submitNouvelleDemande() {
  const numCmdNav = document.getElementById("nd-cmdnav").value.trim();
  const nomClient = document.getElementById("nd-nomclient").value.trim();
  // Le site est déduit du magasin choisi
  const errEl = document.getElementById("nd-error");

  if (!numCmdNav || !numCmdNav.match(/^CV-MC\d+$/)) {
    errEl.textContent = "N° Commande NAV obligatoire (format CV-MC suivi de chiffres).";
    errEl.classList.remove("hidden"); return;
  }
  if (!nomClient) {
    errEl.textContent = "Nom du client obligatoire.";
    errEl.classList.remove("hidden"); return;
  }
  // Collecter les expéditions
  const expGroups = document.querySelectorAll(".exp-group");
  const expeditions = [];
  let valid = true;

  expGroups.forEach(g => {
    const magId = g.querySelector(".exp-magasin").value;
    const tel = g.querySelector(".exp-tel")?.value.trim() || "";
    const chauffeur = g.querySelector(".exp-chauffeur")?.value.trim() || "";
    const plaque = g.querySelector(".exp-plaque")?.value.trim() || "";
    if (!magId) { valid = false; return; }
    const mag = MAGASINS.find(m => m.id === magId);
    expeditions.push({
      numExpedition: "",  // généré côté serveur
      zone: mag ? mag.zone : "",
      site: mag ? mag.site : "",
      magasinId: magId,
      magasinLabel: mag ? mag.label : "",
      magasinEmail: mag ? mag.email : "",
      magasinNom: mag ? mag.nom : "",
      tel, chauffeur, plaque,
    });
  });

  if (!valid || !expeditions.length) {
    errEl.textContent = "Veuillez sélectionner un magasin pour chaque expédition.";
    errEl.classList.remove("hidden"); return;
  }

  errEl.classList.add("hidden");
  const btn = document.getElementById("nd-submit");
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Envoi…';

  try {
    const siteDetecte = expeditions.length > 0 && expeditions.every(e => e.site === expeditions[0].site)
      ? expeditions[0].site
      : expeditions.map(e => e.site).filter((v,i,a) => a.indexOf(v) === i).join(" + ");
    await api("createCommande", {
      numCmdNav,
      nomClient,
      site: siteDetecte,
      commercialEmail: currentUser.email,
      commercialNom: currentUser.nom,
      expeditions,
    });
    showToast("Instruction envoyée — les responsables ont été notifiés", "success");
    navigateTo("file");
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove("hidden");
    btn.disabled = false;
    btn.innerHTML = '🚀 Envoyer l\'instruction de préparation';
  }
}

async function submitEditUser(id) {
  const nom  = document.getElementById("edit-nom").value.trim();
  const role = document.getElementById("edit-role").value;
  const site = document.getElementById("edit-site").value;
  const zone = document.getElementById("edit-zone").value;
  const pinEl = document.getElementById("edit-pin");
  const pin  = pinEl ? pinEl.value.trim() : undefined;
  const payload = { id, nom, role, site, zone };
  if (pin) payload.pin = pin;
  try {
    await api("updateUser", payload);
    closeModal();
    showToast("Utilisateur modifié", "success");
    renderUtilisateurs();
  } catch(e) { document.getElementById("edit-error").textContent=e.message; document.getElementById("edit-error").classList.remove("hidden"); }
}

async function doDeleteUser(id) {

async function doHardDeleteUser(id, nom) {
  const confirmation = prompt(`Suppression DÉFINITIVE de "${nom}".\nCette action est irréversible.\n\nTapez SUPPRIMER pour confirmer :`);
  if (confirmation !== "SUPPRIMER") { if (confirmation !== null) showToast("Suppression annulée", "error"); return; }
  try {
    await api("hardDeleteUser", { id });
    showToast("Compte supprimé définitivement", "success");
    renderUtilisateurs();
  } catch(e) { showToast("Erreur : " + e.message, "error"); }
}

async function doReactivateUser(id) {

}

async function submitFeuVert(expId, statut) {
  const plaque = document.getElementById("fv-plaque")?.value.trim() || "";
  const chauffeur = document.getElementById("fv-chauffeur")?.value.trim() || "";
  const tel = document.getElementById("fv-tel")?.value.trim() || "";
  const errEl = document.getElementById("fv-error");
  if (!plaque) { errEl.textContent = "Plaque obligatoire."; errEl.classList.remove("hidden"); return; }
  if (!chauffeur) { errEl.textContent = "Nom du chauffeur obligatoire."; errEl.classList.remove("hidden"); return; }
  if (!tel) { errEl.textContent = "N° de téléphone chauffeur obligatoire."; errEl.classList.remove("hidden"); return; }
  try {
    await api("feuVert", { expId, acteurEmail: currentUser.email, acteurNom: currentUser.nom, plaque, chauffeur, numeroChauffeur: tel, validationChauffeur: statut });
    closeModal();
    if (statut === "probleme") {
      showToast("Problème signalé — feu vert accordé avec réserve", "warning");
    } else {
      showToast("Feu vert accordé — notification envoyée", "success");
    }
    renderCurrentPage();
  } catch(e) { showToast("Erreur : " + e.message, "error"); }
}

      </div>
      <div class="form-group">
        <label class="form-label">N° BL (Bon de Livraison) *</label>
        <input class="form-input" id="t2-bl" placeholder="EV-MC123456"
          oninput="autoFormat(this,'EV-MC')" style="font-family:monospace">
        <div class="form-hint">Format : EV-MC suivi des chiffres</div>
      </div>
      <div class="form-group">
        <label class="form-label">Heure de fin de préparation</label>
        <input type="datetime-local" class="form-input" id="t2-heure" value="${now}">
        <div class="form-hint">Laissez à maintenant ou saisissez l'heure NAV exacte</div>
      </div>
      <div id="t2-error" class="form-error hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-warning" onclick="submitT2('${expId}')">📦 Enregistrer</button>
    </div>
  `);
}

async function submitT2(expId) {
  const plaque    = document.getElementById("t2-plaque")?.value.trim() || "";
  const chauffeur = document.getElementById("t2-chauffeur")?.value.trim() || "";
  const tel       = document.getElementById("t2-tel")?.value.trim() || "";
  const numeroBL  = document.getElementById("t2-bl").value.trim();
  const heureT2   = document.getElementById("t2-heure").value;
  const errEl     = document.getElementById("t2-error");

  if (!plaque)    { errEl.textContent = "Plaque d'immatriculation obligatoire.";          errEl.classList.remove("hidden"); return; }
  if (!chauffeur) { errEl.textContent = "Nom du chauffeur obligatoire.";                    errEl.classList.remove("hidden"); return; }
  if (!tel)       { errEl.textContent = "N° de téléphone du chauffeur obligatoire.";        errEl.classList.remove("hidden"); return; }
  if (!numeroBL || !numeroBL.match(/^EV-MC/i)) {
    errEl.textContent = "N° BL obligatoire (format EV-MC suivi des chiffres)."; errEl.classList.remove("hidden"); return;
  }
  try {
    await api("jalon_t2", { expId, acteurEmail: currentUser.email, acteurNom: currentUser.nom, heureT2, numeroBL, plaque, chauffeur, numeroChauffeur: tel });
    closeModal();
    showToast("T2 enregistré — en attente poste de garde", "success");
    renderCurrentPage();
  } catch(e) { showToast("Erreur : " + e.message, "error"); }
}

// T3 — Sortie poste de garde
function openT3(expId, numExp) {
  const allExps = allCommandes.flatMap(c => c.expeditions || []);
  const exp = allExps.find(e => e.id === expId);
  const plaqueConnue   = exp?.plaque || "";
  const chauffeurConnu = exp?.chauffeur || "";
  const telConnu       = exp?.tel || exp?.numeroChauffeur || "";
  const blConnu        = exp?.numeroBL || "";

  // Ligne info-detail pour chaque donnée connue
  const infoRow = (label, val) => val
    ? `<div style="display:flex;gap:8px;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;color:var(--muted);min-width:120px">${label}</span>
        <span style="font-weight:600;font-size:14px">${val}</span>
       </div>`
    : ``;

  openModal(`
    <div class="modal-header">
      <div class="modal-title">🚗 Validation sortie — ${numExp}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="card" style="margin-bottom:14px;background:var(--bg)">
        <div class="card-body" style="padding:10px 14px">
          ${infoRow("Chauffeur", chauffeurConnu)}
          ${infoRow("Téléphone", telConnu)}
          ${infoRow("N° BL", blConnu)}
          ${!plaqueConnue && !chauffeurConnu ? `<p style="color:var(--muted);font-size:13px;margin:4px 0">Aucune information renseignée</p>` : ""}
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Plaque d'immatriculation *
          <span style="font-size:11px;color:var(--muted);font-weight:400"> — corrigez si nécessaire</span>
        </label>
        <input class="form-input" id="t3-plaque"
          placeholder="DK-1234-A"
          value="${plaqueConnue}"
          oninput="this.value=this.value.toUpperCase();checkPlaqueMatch('${plaqueConnue}')">
        <div id="t3-plaque-warn" class="form-hint ${plaqueConnue ? 'hidden' : ''}" style="color:var(--warning)">
          ⚠️ Plaque non renseignée — saisissez-la
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Vérification du chauffeur</label>
        <div style="display:flex;gap:8px;align-items:center;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);margin-bottom:6px">
          <span style="flex:1;font-size:14px;font-weight:600">${chauffeurConnu || "<em style=\"color:var(--muted)\">Non renseigné</em>"}</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" id="t3-chauf-ok-btn"
            onclick="toggleT3Chauffeur('ok')"
            style="flex:1;background:#D1FAE5;color:#065F46;border:none;font-weight:600">
            ✅ Chauffeur confirmé
          </button>
          <button class="btn btn-sm" id="t3-chauf-pb-btn"
            onclick="toggleT3Chauffeur('probleme')"
            style="flex:1;background:#FEF3C7;color:#92400E;border:none;font-weight:600">
            ⚠️ Problème / Différent
          </button>
        </div>
        <input type="hidden" id="t3-chauffeur-statut" value="">
        <div id="t3-chauffeur-correction" class="hidden" style="margin-top:8px">
          <input class="form-input" id="t3-chauffeur-new" placeholder="Nom du chauffeur réel" style="margin-bottom:0">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">N° Bon de Livraison *</label>
        <div style="display:flex;align-items:center;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;">
          <span style="background:#f0f4ff;padding:10px 12px;font-family:monospace;font-size:14px;font-weight:700;color:var(--primary);border-right:1.5px solid var(--border);white-space:nowrap;">EV-MC</span>
          <input id="t3-bl-num" type="text" inputmode="numeric"
            style="flex:1;border:none;outline:none;padding:10px 12px;font-family:monospace;font-size:14px;"
            placeholder="123456"
            value="${blConnu.replace(/^EV-MC/i,'')}"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Saisissez uniquement le numéro après EV-MC (ex: 123456)</div>
        <div id="scan-status" class="form-hint hidden" style="color:var(--success)">Mode scan actif</div>
      </div>

      <div class="form-group">
        <label class="form-label">Photo du BL <span style="font-size:11px;color:var(--muted);font-weight:400">(optionnelle)</span></label>
        <div class="scan-zone" id="t3-photo-zone"
          onclick="document.getElementById('t3-photo-input').click()" style="cursor:pointer">
          📷 Prendre une photo du BL
          <input type="file" id="t3-photo-input" accept="image/*" capture="environment"
            class="hidden" onchange="previewPhoto(this)">
        </div>
        <img id="t3-photo-preview" class="photo-preview hidden">
      </div>

      <div id="t3-retard-info" class="alert alert-warning hidden">
        ⚠️ Ce véhicule sera marqué en retard — le responsable sera notifié pour justifier.
      </div>
      <div id="t3-error" class="form-error hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-success" onclick="submitT3('${expId}','${plaqueConnue}','${chauffeurConnu}')">✅ Enregistrer fin de livraison</button>
    </div>
  `);

  if (exp?.t0) {
    const mins = Math.round((Date.now() - new Date(exp.t0)) / 60000);
    if (mins > 30) document.getElementById("t3-retard-info")?.classList.remove("hidden");
  }
}

function checkPlaqueMatch(plaqueAttendue) {
  const warnEl = document.getElementById("t3-plaque-warn");
  if (!warnEl) return;
  const plaqueInput = document.getElementById("t3-plaque").value.trim();
  if (!plaqueInput) {
    warnEl.textContent = "⚠️ Plaque non renseignée — saisissez-la";
    warnEl.classList.remove("hidden");
  } else if (plaqueAttendue && plaqueInput !== plaqueAttendue) {
    warnEl.textContent = "⚠️ Plaque différente de celle attendue (" + plaqueAttendue + ")";
    warnEl.classList.remove("hidden");
  } else {
    warnEl.classList.add("hidden");
  }
}

function toggleT3Chauffeur(statut) {
  document.getElementById("t3-chauffeur-statut").value = statut;
  const okBtn = document.getElementById("t3-chauf-ok-btn");
  const pbBtn = document.getElementById("t3-chauf-pb-btn");
  const corrDiv = document.getElementById("t3-chauffeur-correction");
  if (statut === "ok") {
    okBtn.style.outline = "2px solid #065F46";
    pbBtn.style.outline = "none";
    corrDiv.classList.add("hidden");
  } else {
    pbBtn.style.outline = "2px solid #92400E";
    okBtn.style.outline = "none";
    corrDiv.classList.remove("hidden");
    document.getElementById("t3-chauffeur-new")?.focus();
  }
}

async function submitT3(expId, plaqueAttendue, chauffeurAttendu) {
  const plaque       = document.getElementById("t3-plaque").value.trim();
  const blNum        = document.getElementById("t3-bl-num").value.trim();
  const numeroBL     = blNum ? "EV-MC" + blNum : "";
  const photoPreview = document.getElementById("t3-photo-preview");
  const photoBlUrl   = photoPreview && !photoPreview.classList.contains("hidden") ? photoPreview.src : "";
  const errEl        = document.getElementById("t3-error");

  const chauffeurStatut = document.getElementById("t3-chauffeur-statut")?.value || "";
  const chauffeurNew    = document.getElementById("t3-chauffeur-new")?.value.trim() || "";
  if (!plaque)          { errEl.textContent = "Plaque d'immatriculation obligatoire."; errEl.classList.remove("hidden"); return; }
  if (!chauffeurStatut) { errEl.textContent = "Veuillez confirmer ou signaler un problème sur le chauffeur."; errEl.classList.remove("hidden"); return; }
  if (!numeroBL)   { errEl.textContent = "N° de Bon de Livraison obligatoire."; errEl.classList.remove("hidden"); return; }
  // Photo optionnelle — plus de validation obligatoire

  errEl.classList.add("hidden");

  try {
    const result = await api("jalon_t3", {
      expId,
      acteurEmail: currentUser.email,
      acteurNom: currentUser.nom,
      plaque,
      chauffeur: chauffeurNew || chauffeurAttendu,
      numeroBL,
      plaqueAttendue,
      photoBlUrl: photoBlUrl.startsWith("data:") ? photoBlUrl : "",
      validationChauffeur: chauffeurStatut,
      commentaireChauffeur: chauffeurStatut === "probleme" && chauffeurNew ? "Chauffeur corrigé : " + chauffeurNew : "",
    });
    closeModal();
    const msg = result.enRetard
      ? "Sortie validée — en retard, le responsable de dépôt sera notifié pour justifier"
      : "Sortie validée (T3) — notification envoyée";
    showToast(msg, result.enRetard ? "warning" : "success");
    renderCurrentPage();
  } catch(e) {
    showToast("Erreur : " + e.message, "error");
  }
}


// Justifier un retard (responsable)
function openJustifRetard(expId, numExp) {
  const motifsHtml = allMotifs.map((m, i) => `
    <div class="motif-item" id="motif-item-${i}" onclick="toggleMotifItem(this)">
      <input type="checkbox" class="motif-cb" id="motif-cb-${i}" value="${m.libelle}">
      <span>${m.libelle}</span>
    </div>
  `).join("");

  openModal(`
    <div class="modal-header">
      <div class="modal-title">⚠️ Justifier retard — ${numExp}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-warning">Cette expédition est sortie avec un délai > 30 min. Veuillez justifier le retard.</div>
      <div class="form-group">
        <label class="form-label">Motif(s) * <span style="color:var(--muted);font-size:12px">(cliquez pour sélectionner)</span></label>
        <div class="motif-grid">${motifsHtml || '<p style="color:var(--muted)">Aucun motif configuré</p>'}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Commentaire</label>
        <textarea class="form-textarea" id="justif-commentaire" rows="2" placeholder="Précisez si nécessaire…"></textarea>
      </div>
      <div id="justif-error" class="form-error hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-warning" onclick="submitJustif('${expId}')">Enregistrer</button>
    </div>
  `);
}

function toggleMotifItem(el) {
  el.classList.toggle("selected");
  const cb = el.querySelector("input[type=checkbox]");
  if (cb) cb.checked = el.classList.contains("selected");
}

async function submitJustif(expId) {
  const motifs = [...document.querySelectorAll(".motif-item.selected .motif-cb")].map(i => i.value);
  const commentaire = document.getElementById("justif-commentaire")?.value || "";
  const errEl = document.getElementById("justif-error");
  if (!motifs.length) {
    if (errEl) { errEl.textContent = "Choisissez au moins un motif."; errEl.classList.remove("hidden"); }
    else showToast("Choisissez au moins un motif", "error");
    return;
  }
  try {
    await api("justifierRetard", { expId, motifRetard: motifs, commentaireRetard: commentaire, acteurEmail: currentUser.email });
    closeModal();
    showToast("Retard justifié — merci", "success");
    await refreshBadgeRetard();
    renderCurrentPage();
  } catch(e) {
    if (errEl) { errEl.textContent = e.message; errEl.classList.remove("hidden"); }
    else showToast("Erreur : " + e.message, "error");
  }
}

function activateScan() {
  const input = document.getElementById("t3-bl");
  const status = document.getElementById("scan-status");
  if (input) input.focus();
  if (status) status.classList.remove("hidden");
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("t3-photo-preview");
    if (img) {
      img.src = e.target.result;
      img.classList.remove("hidden");
    }
    // Changer l'apparence de la zone
    const zone = document.getElementById("t3-photo-zone");
    if (zone) zone.style.background = "rgba(39,174,96,0.05)";
  };
  reader.readAsDataURL(file);
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay" onclick="closeModalIfOverlay(event)">
      <div class="modal">${html}</div>
    </div>
  `;
}
function closeModal() { document.getElementById("modal-container").innerHTML = ""; }
function closeModalIfOverlay(e) { if (e.target.classList.contains("modal-overlay")) closeModal(); }

// ─── UTILS ───────────────────────────────────────────────────────────────────
function showToast(msg, type = "") {
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmtTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit"});
}
function fmtDateTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString("fr-FR", {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}
function fmtDuree(mins) {
  if (mins === null || mins === undefined) return "—";
  if (mins < 60) return mins + " min";
  return Math.floor(mins/60) + "h" + String(mins%60).padStart(2,"0");
}
function kpiColor(pct) {
  if (pct === null) return "";
  if (pct >= 80) return "kpi-ok";
  if (pct >= 60) return "kpi-warn";
  return "kpi-bad";
}
function kpiColorClass(pct) {
  if (pct === null) return "";
  if (pct >= 80) return "duree-ok";
  if (pct >= 60) return "duree-warn";
  return "duree-bad";
}
function renderBadge(statut) {
  const labels = { en_attente:"En attente", feu_vert:"✅ Feu vert", prete:"Prête", sortie:"Sortie", terminee:"Terminée" };
  return `<span class="badge badge-${statut}">${labels[statut] || statut}</span>`;
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
function iconList() { return '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 4h12M2 8h12M2 12h8"/></svg>'.replace(/><\//g,'> stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></');}
function iconPlus() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>`; }
function iconWrench() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10.5 1.5a4 4 0 0 1-4 6L2 12a1.5 1.5 0 0 0 2 2l4.5-4.5a4 4 0 0 1 6-4l-2 2-1-1 1-1-1-1z"/></svg>`; }
function iconShield() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 1l6 2v5c0 3-2.5 5.5-6 7C2.5 13.5 0 11 0 8V3l8-2z"/></svg>`; }
function iconChart() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 12l4-5 3 3 4-7"/><path d="M1 15h14"/></svg>`; }
function iconSettings() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>`; }
function iconWarning() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L1 14h14L8 2z"/><path d="M8 6v4"/><circle cx="8" cy="12" r="0.5" fill="currentColor"/></svg>`; }
function iconUsers() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="5.5" cy="4" r="2.5"/><circle cx="10.5" cy="4" r="2.5"/><path d="M0.5 14c0-3 2.2-5 5-5s5 2 5 5"/><path d="M6 14c0-3 2.2-5 5-5s5 2 5 5"/></svg>`; }
function iconPackage() { return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4l6-3 6 3v8l-6 3-6-3V4z"/><path d="M8 1v14M2 4l6 3 6-3"/></svg>`; }
</script>

function onGsiError() {
